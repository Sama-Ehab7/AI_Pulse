<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insight ABSA - Aspect-Based Sentiment Analysis</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <h1 class="hero-title">Insight ABSA</h1>
        <p class="hero-sub">Understand customer feedback with aspect-level sentiment analysis</p>

        <div class="input-card">
            <textarea id="inputText" placeholder="Write your review here... 
Example: The food was amazing and the service was incredibly fast! However, the prices are a bit high."></textarea>
            <button onclick="analyze()" class="btn-primary">Analyze Review →</button>
        </div>

        <div id="results"></div>

        <h3 class="section-label">📜 Previous Reviews & Analysis</h3>
        <div id="history"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
